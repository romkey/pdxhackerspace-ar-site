<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Wall clock AR</title>
    <link rel="stylesheet" href="css/wall-clock.css" />
    <link rel="stylesheet" href="css/site-footer.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .hint {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.75rem 1rem;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 0.875rem/1.4 system-ui, sans-serif;
        text-align: center;
        z-index: 1;
        transition: opacity 0.25s ease;
      }
      .hint.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="ar-page">
    <p class="hint" id="hint">
      Point your camera at the clock anchor on the poster.
    </p>

    <div id="wall-clock" class="wall-clock" aria-live="polite">
      <div id="wall-clock-picker" class="wall-clock__picker"></div>
      <div class="wall-clock__stage">
        <div
          class="clock-face clock-face--analog"
          data-face="analog"
          role="tabpanel"
          aria-label="Neon dial clock"
        ></div>
        <div
          class="clock-face clock-face--digital"
          data-face="digital"
          role="tabpanel"
          aria-label="Terminal clock"
          hidden
        ></div>
        <div
          class="clock-face clock-face--orbit"
          data-face="orbit"
          role="tabpanel"
          aria-label="Orbit clock"
          hidden
        ></div>
      </div>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
    >
      <a-marker
        id="clock-marker"
        type="pattern"
        url="markers/anchor-clock.patt"
        size="0.06"
        emitevents="true"
        smooth="true"
        smoothCount="5"
      ></a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script type="module" src="js/wall-clock.js"></script>
    <script src="js/site-footer.js"></script>
  </body>
</html>
