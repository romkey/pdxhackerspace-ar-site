<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Wall clock AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>
    <script src="js/wall-display.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
      }
      .hint {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0.75rem 1rem;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font: 0.875rem/1.4 system-ui, sans-serif;
        text-align: center;
        z-index: 1;
        transition: opacity 0.25s ease;
      }
      .hint.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <p class="hint" id="hint">Point your camera at the Hiro marker on the poster.</p>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
    >
      <a-marker id="hiro-marker" preset="hiro" emitevents="true" smooth="true" smoothCount="5">
        <!-- Lay flat on the marker plane so text faces the camera. -->
        <a-entity position="0 0.55 0" rotation="-90 0 0">
          <a-plane
            width="1.35"
            height="0.42"
            material="color: #0d1117; opacity: 0.92; transparent: true; shader: flat"
          ></a-plane>
          <a-text
            wall-display
            align="center"
            color="#f0f6fc"
            width="2.8"
            wrap-count="24"
            position="0 0 0.01"
            scale="1 1 1"
          ></a-text>
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      (function () {
        var marker = document.querySelector("#hiro-marker");
        var hint = document.querySelector("#hint");
        if (!marker || !hint) return;

        marker.addEventListener("markerFound", function () {
          hint.classList.add("is-hidden");
        });
        marker.addEventListener("markerLost", function () {
          hint.classList.remove("is-hidden");
        });
      })();
    </script>
  </body>
</html>
